<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Generate printable PDF sheets with CODE128 barcodes. Customize grid layout and export multiple barcodes at once.">
    <title>Barcode PDF Generator</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" 
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    
    <!-- External Libraries with defer -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js" defer></script>
    
    <!-- App Scripts with defer -->
    <script src="pdfGenerator.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body>
    <main class="container mt-5" role="main">
        <h1 class="text-center mb-4">Barcode PDF Generator</h1>

        <form id="barcodeForm" aria-label="Barcode PDF configuration form">
            <div class="mb-3">
                <label for="pdfTitle" class="form-label">PDF Title (max 60 characters):</label>
                <input type="text" id="pdfTitle" class="form-control pdf-title-input" maxlength="60" 
                       required aria-required="true" aria-describedby="pdfTitleHelp"
                       placeholder="Enter a title for your PDF">
                <div class="field-feedback" aria-live="polite"></div>
                <div id="pdfTitleHelp" class="form-text visually-hidden">Enter a descriptive title up to 60 characters</div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="columns" class="form-label">Columns (3-4):</label>
                    <input type="number" id="columns" class="form-control" min="3" max="4" 
                           required aria-required="true" placeholder="3 or 4">
                    <div class="field-feedback" aria-live="polite"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="rows" class="form-label">Rows (10-13):</label>
                    <input type="number" id="rows" class="form-control" min="10" max="13" 
                           required aria-required="true" placeholder="10 to 13">
                    <div class="field-feedback" aria-live="polite"></div>
                </div>
            </div>

            <div class="mb-3">
                <label for="barcodeData" class="form-label">
                    Barcode Data (one per line, max 15 characters each):
                    <span id="barcodeCount" class="barcode-count">0 barcodes</span>
                </label>
                <textarea id="barcodeData" class="form-control" rows="10" 
                          required aria-required="true" aria-describedby="barcodeDataHelp"
                          placeholder="ABC123&#10;DEF456&#10;GHI789&#10;..."></textarea>
                <div class="field-feedback" aria-live="polite"></div>
                <div id="barcodeDataHelp" class="form-text">Enter one barcode value per line. Only ASCII characters allowed.</div>
            </div>

            <!-- Preview Section -->
            <div class="preview-section mb-3">
                <button type="button" id="previewToggle" class="btn btn-outline-secondary btn-sm" 
                        aria-expanded="false" aria-controls="previewContainer">
                    Show Preview
                </button>
                <div id="previewContainer" class="preview-container collapsed">
                    <div id="previewGrid" class="preview-grid"></div>
                </div>
            </div>

            <div id="errorContainer" class="error-message" role="alert" aria-live="polite" aria-atomic="true"></div>

            <button type="button" id="generatePdf" class="btn btn-primary" aria-label="Generate PDF with barcodes" disabled>
                Generate PDF
            </button>
        </form>
    </main>

    <!-- CDN Fallback Check (runs after all deferred scripts) -->
    <script>
        window.addEventListener('load', function() {
            // Check if jsPDF loaded
            if (typeof window.jspdf === 'undefined' && typeof window.jsPDF === 'undefined') {
                console.error('jsPDF failed to load from CDN');
                document.getElementById('errorContainer').textContent = 'Failed to load PDF library. Please refresh the page or check your internet connection.';
                document.getElementById('errorContainer').classList.add('visible');
            }
            // Check if JsBarcode loaded
            if (typeof JsBarcode === 'undefined') {
                console.error('JsBarcode failed to load from CDN');
                document.getElementById('errorContainer').textContent = 'Failed to load barcode library. Please refresh the page or check your internet connection.';
                document.getElementById('errorContainer').classList.add('visible');
            }
        });
    </script>
</body>
</html>
