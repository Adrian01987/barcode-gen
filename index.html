<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Generate printable PDF sheets with barcodes (CODE128, CODE39, EAN-13, UPC-A, ITF-14). Customize grid layout and export multiple barcodes at once.">
    <title>Barcode PDF Generator</title>

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Barcode PDF Generator">
    <meta property="og:description" content="Generate printable PDF sheets with barcodes. Supports CODE128, CODE39, EAN-13, UPC-A, and ITF-14 formats.">
    <meta property="og:url" content="https://adrian01987.github.io/barcode-gen/">
    <meta name="twitter:card" content="summary">

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' https://cdn.jsdelivr.net; connect-src 'self';">

    <!-- Favicon (barcode icon) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='5' y='10' width='6' height='80' fill='%23333'/><rect x='15' y='10' width='3' height='80' fill='%23333'/><rect x='22' y='10' width='8' height='80' fill='%23333'/><rect x='34' y='10' width='4' height='80' fill='%23333'/><rect x='42' y='10' width='6' height='80' fill='%23333'/><rect x='52' y='10' width='3' height='80' fill='%23333'/><rect x='58' y='10' width='8' height='80' fill='%23333'/><rect x='70' y='10' width='5' height='80' fill='%23333'/><rect x='79' y='10' width='3' height='80' fill='%23333'/><rect x='86' y='10' width='9' height='80' fill='%23333'/></svg>">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">

    <!-- External Libraries with defer and SRI -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer
            integrity="sha384-JcnsjUPPylna1s1fvi1u12X5qjY5OL56iySh75FdtrwhO/SWXgMjoVqcKyIIWOLk" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js" defer
            integrity="sha384-tOUygabpHGzWXpKv3qJM5f9tSgU6p5f4ooCayrNDwzm3/3/CDMzgHMLQZiMMGghV" crossorigin="anonymous"></script>

    <!-- App Scripts with defer -->
    <script src="pdfGenerator.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body>
    <main class="container mt-5" role="main">
        <h1 class="text-center mb-4">Barcode PDF Generator</h1>

        <form id="barcodeForm" aria-label="Barcode PDF configuration form">
            <div class="mb-3">
                <label for="pdfTitle" class="form-label">PDF Title (max 60 characters):</label>
                <input type="text" id="pdfTitle" class="form-control pdf-title-input" maxlength="60"
                       required aria-required="true" aria-describedby="pdfTitleHelp"
                       placeholder="Enter a title for your PDF">
                <div class="field-feedback" aria-live="polite"></div>
                <div id="pdfTitleHelp" class="form-text visually-hidden">Enter a descriptive title up to 60 characters</div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="columns" class="form-label">Columns (2-5):</label>
                    <input type="number" id="columns" class="form-control" min="2" max="5"
                           required aria-required="true" placeholder="2 to 5">
                    <div class="field-feedback" aria-live="polite"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="rows" class="form-label">Rows (5-15):</label>
                    <input type="number" id="rows" class="form-control" min="5" max="15"
                           required aria-required="true" placeholder="5 to 15">
                    <div class="field-feedback" aria-live="polite"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="barcodeFormat" class="form-label">Barcode Format:</label>
                    <select id="barcodeFormat" class="form-select" aria-describedby="formatHelp">
                        <option value="CODE128" selected>CODE128 (General purpose)</option>
                        <option value="CODE39">CODE39 (Alphanumeric)</option>
                        <option value="EAN13">EAN-13 (Product codes)</option>
                        <option value="UPC">UPC-A (US product codes)</option>
                        <option value="ITF14">ITF-14 (Shipping containers)</option>
                    </select>
                    <div id="formatHelp" class="form-text">Supports all ASCII characters (0-127)</div>
                </div>
            </div>

            <div class="mb-3">
                <label for="barcodeData" class="form-label">
                    Barcode Data (one per line, max 15 characters each):
                    <span id="barcodeCount" class="barcode-count">0 barcodes</span>
                </label>
                <textarea id="barcodeData" class="form-control" rows="10"
                          required aria-required="true" aria-describedby="barcodeDataHelp"
                          placeholder="ABC123&#10;DEF456&#10;GHI789&#10;..."></textarea>
                <div class="field-feedback" aria-live="polite"></div>
                <div class="barcode-data-actions">
                    <div id="barcodeDataHelp" class="form-text">Enter one barcode value per line.</div>
                    <label class="btn btn-outline-secondary btn-sm file-import-label" for="fileImport">
                        Import from file
                    </label>
                    <input type="file" id="fileImport" accept=".txt,.csv" class="visually-hidden"
                           aria-label="Import barcode data from a text or CSV file">
                </div>
            </div>

            <!-- Preview Section -->
            <div class="preview-section mb-3">
                <button type="button" id="previewToggle" class="btn btn-outline-secondary btn-sm"
                        aria-expanded="false" aria-controls="previewContainer">
                    Show Preview
                </button>
                <span id="previewSummary" class="preview-summary" aria-live="polite"></span>
                <div id="previewContainer" class="preview-container collapsed">
                    <div id="previewGrid" class="preview-grid"></div>
                </div>
            </div>

            <!-- Progress Bar -->
            <div id="progressContainer" class="progress-container" role="status" aria-live="polite">
                <div class="progress">
                    <div id="progressBar" class="progress-bar" role="progressbar"
                         aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" style="width: 0%"></div>
                </div>
                <span id="progressText" class="progress-text"></span>
            </div>

            <div id="errorContainer" class="error-message" role="alert" aria-live="polite" aria-atomic="true"></div>

            <div class="action-buttons">
                <button type="button" id="generatePdf" class="btn btn-primary" aria-label="Generate PDF with barcodes" disabled>
                    Generate PDF
                </button>
                <button type="button" id="printBarcodes" class="btn btn-outline-primary" aria-label="Print barcodes directly" disabled>
                    Print
                </button>
            </div>
        </form>
    </main>

    <!-- CDN Fallback Check (runs after all deferred scripts) -->
    <script>
        window.addEventListener('load', function() {
            var errorEl = document.getElementById('errorContainer');
            var retryBtn = document.getElementById('retryLoadBtn');
            var failed = false;

            if (typeof window.jspdf === 'undefined' && typeof window.jsPDF === 'undefined') {
                console.error('jsPDF failed to load from CDN');
                errorEl.textContent = 'Failed to load PDF library. Please check your internet connection.';
                errorEl.classList.add('visible');
                failed = true;
            }
            if (typeof JsBarcode === 'undefined') {
                console.error('JsBarcode failed to load from CDN');
                errorEl.textContent = 'Failed to load barcode library. Please check your internet connection.';
                errorEl.classList.add('visible');
                failed = true;
            }

            if (failed && retryBtn) {
                retryBtn.style.display = 'inline-block';
                retryBtn.addEventListener('click', function() {
                    window.location.reload();
                });
            }

            // Register Service Worker for PWA
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(function() {
                    // Service worker registration failed silently
                });
            }
        });
    </script>
    <button type="button" id="retryLoadBtn" class="btn btn-warning btn-sm retry-btn" style="display:none;">
        Retry loading libraries
    </button>
</body>
</html>
